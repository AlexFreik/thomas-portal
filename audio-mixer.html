<!doctype html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="utf-8" />
    <title>Thomas Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" />

    <script type="module" src="./script.js"></script>
  </head>

  <body class="h-screen bg-base-200">
    <div class="flex h-full">
      <!-- LEFT PANEL -->
      <div id="leftPanel" class="w-[500px] bg-base-100 p-6 flex flex-col gap-6 overflow-auto">
        <h2 class="text-xl font-bold">Thomas Portal Demo</h2>

        <div class="flex gap-2">
          <button id="setupObsBtn" class="btn btn-primary btn-sm w-fit">Setup OBS</button>
          <button id="fullscreenBtn" class="btn btn-sm w-fit">Full Screen</button>
        </div>

        <!-- Camera -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Camera</span>
          </label>
          <select id="camera" class="select select-bordered select-sm w-full"></select>
        </div>

        <!-- Mic -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Microphone</span>
          </label>

          <select id="mic" class="select select-bordered select-sm w-full"></select>
        </div>

        <!-- Master -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Master Speaker</span>
          </label>
          <select id="master" class="select select-bordered select-sm w-full"></select>
        </div>

        <!-- Headphones -->
        <div class="form-control">
          <label class="label">
            <span class="label-text font-semibold">Headphones</span>
          </label>
          <select id="headphones" class="select select-bordered select-sm w-full"></select>
        </div>

        <!-- Source buttons -->
        <div class="flex gap-2 pt-4">
          <button id="cameraBtn" class="btn btn-accent btn-sm">Camera</button>
          <button id="videoBtn" class="btn btn-secondary btn-sm">Video</button>
        </div>
      </div>

      <!-- DIVIDER -->
      <div id="divider" class="w-1 bg-base-300 cursor-col-resize"></div>

      <!-- RIGHT PANEL -->
      <div id="rightPanel" class="flex-1 flex flex-col p-4 gap-4">
        <div class="flex gap-2 items-stretch">
          <!-- PLAYER -->
          <div class="aspect-video flex-1">
            <video id="player" controls playsinline class="w-full h-full bg-black" crossorigin="anonymous"></video>
          </div>

          <!-- METER -->
          <canvas id="master-meter" class="w-[20px] bg-base-300 rounded self-stretch" width="100" height="100"></canvas>
        </div>

        <!-- CAMERA PREVIEW + MIC METER -->
        <div class="flex gap-2">
          <video id="camera-preview" playsinline class="aspect-video bg-black h-[150px] rounded-lg"></video>

          <canvas id="mic-meter" class="bg-base-300 rounded w-[20px]" width="100" height="100"></canvas>

          <div class="inline-flex flex-col items-center text-center">
            <input id="mic-gain" type="range" min="0" max="200" value="100" style="direction: rtl" class="[writing-mode:vertical-lr] w-4" />
            <span class="text-xs mt-1 w-[30px]" id="mic-gain-label">100%</span>
          </div>

          <!-- Toggle buttons -->
          <div class="flex flex-col gap-2">
            <!-- Mic mute -->
            <label class="swap btn btn-sm btn-outline w-20">
              <input id="mic-toggle" type="checkbox" checked />

              <span class="swap-on">🎤</span>
              <span class="swap-off">❌🎤</span>
            </label>

            <!-- Mic preview -->
            <label class="swap btn btn-sm btn-outline w-20">
              <input id="mic-preview-toggle" type="checkbox" />

              <span class="swap-on">🎧</span>
              <span class="swap-off">❌🎧</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <script>
      const divider = document.getElementById('divider');
      const leftPanel = document.getElementById('leftPanel');

      let dragging = false;

      divider.addEventListener('mousedown', () => (dragging = true));

      document.addEventListener('mouseup', () => (dragging = false));

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;

        const newWidth = e.clientX;
        leftPanel.style.width = newWidth + 'px';
      });
    </script>
  </body>
</html>
