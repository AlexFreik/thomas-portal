<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Audio Mixer Demo</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      select {
        margin-right: 10px;
      }
      video {
        display: block;
        margin-top: 20px;
        width: 640px;
        background: black;
      }
      button {
        margin-top: 10px;
      }
    </style>
    <script type="module" src="./script.js"></script>
  </head>

  <body>
    <h3>Audio Mixer Demo</h3>

    <div>
      Camera
      <select id="camera" style="width: 100px"></select>
      <br />

      Mic
      <select id="mic" style="width: 100px"></select>
      <br />

      Master Speaker
      <select id="master" style="width: 100px"></select>
      <br />

      Headphones
      <select id="headphones" style="width: 100px"></select>
    </div>

    <div>
      <video id="camera-preview" controls playsinline style="width: 320px; height: 180px; display: inline-block"></video>
      <canvas id="mic-meter" style="width: 10px; height: 180px" width="100" height="100"></canvas>
    </div>

    <video id="player" controls playsinline style="width: 640px; height: 360px; display: inline-block"></video>
    <canvas id="master-meter" style="width: 10px; height: 360px" width="100" height="100"></canvas>

    <div>
      <button id="cameraBtn">Camera</button>
      <button id="videoBtn">Video</button>
    </div>
  </body>
</html>
